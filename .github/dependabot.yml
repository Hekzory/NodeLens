version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: daily
    commit-message:
      prefix: "deps(py):"

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: daily
    commit-message:
      prefix: "deps(docker):"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: daily
    commit-message:
      prefix: "deps(docker):"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "deps(actions):"
