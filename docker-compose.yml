services:

  postgres:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: nodelens
      POSTGRES_PASSWORD: nodelens
      POSTGRES_DB: nodelens
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodelens -d nodelens"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    volumes:
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ingestor:
    build:
      context: .
      dockerfile: deploy/ingestor.Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://nodelens:nodelens@postgres:5432/nodelens"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  plugins:
    build:
      context: .
      dockerfile: deploy/plugins.Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://nodelens:nodelens@postgres:5432/nodelens"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "INFO"
      PLUGINS_DIR: "plugins"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingestor:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://nodelens:nodelens@postgres:5432/nodelens"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "INFO"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  seed:
    build:
      context: .
      dockerfile: deploy/ingestor.Dockerfile
    command: ["python", "scripts/seed_demo.py"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://nodelens:nodelens@postgres:5432/nodelens"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["seed"]
    restart: "no"

volumes:
  pgdata:
