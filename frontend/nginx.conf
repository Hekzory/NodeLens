upstream backend {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Kernel-level static file serving ────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # ── Static file descriptor cache ────────────────────────────
    # Avoids repeated stat()/open() for the same SPA bundle files.
    open_file_cache          max=256 inactive=60s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;

    # ── Gzip ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ── API reverse proxy ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Smaller buffers tuned for JSON API responses (most < 8 KB).
        proxy_buffer_size    4k;
        proxy_buffers        4 4k;
    }

    # ── Hashed static assets — cache aggressively ───────────────
    location /assets/ {
        expires    1w;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
